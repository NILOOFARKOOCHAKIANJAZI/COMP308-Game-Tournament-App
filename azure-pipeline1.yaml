trigger:
- main

pr:
- main

pool:
  name: 'Niloofar-COMP367-FinalProject'
  demands:
  - Agent.Name -equals LAPTOP-QJ83OVCB

variables:
  backendDir: 'Backend'
  frontendDir: 'React-Client'
  sonarServiceConnection: 'FinalProject-Group15-COMP367'
  sonarOrganization: 'niloofarkoochakianjazi'
  sonarProjectKey: 'NILOOFARKOOCHAKIANJAZI_COMP308-Game-Tournament-App'
  sonarProjectName: 'COMP308-Game-Tournament-App'
  artifactName: 'comp308-game-tournament-app-v2'
  frontendDistArtifact: 'frontend-dist'
  deployRoot: 'D:\agent\mock-deployments-V2'

stages:

# =========================
# STATIC ANALYSIS
# =========================
- stage: StaticAnalysis
  displayName: 'Static Analysis'
  jobs:
  - job: SonarScan
    displayName: 'Run SonarQube Cloud Analysis'
    steps:
    - task: SonarCloudPrepare@4
      displayName: 'Prepare SonarQube Cloud Analysis'
      inputs:
        SonarCloud: '$(sonarServiceConnection)'
        organization: '$(sonarOrganization)'
        scannerMode: 'cli'
        configMode: 'manual'
        cliProjectKey: '$(sonarProjectKey)'
        cliProjectName: '$(sonarProjectName)'
        cliSources: '.'
        extraProperties: |
          sonar.sourceEncoding=UTF-8
          sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/.git/**
          sonar.javascript.lcov.reportPaths=$(Build.SourcesDirectory)/Backend/coverage/lcov.info,$(Build.SourcesDirectory)/React-Client/coverage/lcov.info

    - task: SonarCloudAnalyze@4
      displayName: 'Analyze with SonarQube Cloud'
      inputs:
        jdkversion: 'JAVA_HOME'

    - task: SonarCloudPublish@4
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'
      continueOnError: true

# =========================
# BUILD
# =========================
- stage: Build
  displayName: 'Build'
  dependsOn: StaticAnalysis
  condition: succeeded()
  jobs:
  - job: BuildJob
    displayName: 'Compile and Test'
    steps:

    # Step 1: build using project build tool
    - script: |
        echo ===== BACKEND INSTALL =====
        cd $(backendDir)
        npm ci

        echo ===== FRONTEND INSTALL =====
        cd ../$(frontendDir)
        npm ci

        echo ===== FRONTEND BUILD =====
        npm run build

        echo ===== VERIFY FRONTEND DIST =====
        dir "$(Build.SourcesDirectory)\$(frontendDir)\dist"
      displayName: 'Build application using npm'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish frontend dist artifact'
      inputs:
        targetPath: '$(Build.SourcesDirectory)\$(frontendDir)\dist'
        artifact: '$(frontendDistArtifact)'

    # Step 2: unit tests + code coverage
    - script: |
        echo ===== BACKEND TESTS WITH COVERAGE =====
        cd $(backendDir)
        npm run test:coverage

        echo ===== FRONTEND TESTS WITH COVERAGE =====
        cd ../$(frontendDir)
        npm run test:coverage

        echo ===== CHECK COVERAGE FILES =====
        dir "$(Build.SourcesDirectory)\Backend\coverage"
        dir "$(Build.SourcesDirectory)\React-Client\coverage"
      displayName: 'Run unit tests and generate code coverage'

# =========================
# DELIVER
# =========================
- stage: Deliver
  displayName: 'Deliver'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeliverJob
    displayName: 'Package and Publish Artifact'
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download frontend dist artifact'
      inputs:
        artifact: '$(frontendDistArtifact)'
        path: '$(Pipeline.Workspace)\$(frontendDistArtifact)'

    - script: |
        echo ===== PREPARE RELEASE ARTIFACT =====

        if exist release rmdir /s /q release
        mkdir release
        mkdir release\backend
        mkdir release\frontend

        echo ===== COPY BACKEND FILES =====
        xcopy "$(backendDir)\app" "release\backend\app\" /E /I /Y
        xcopy "$(backendDir)\config" "release\backend\config\" /E /I /Y
        copy "$(backendDir)\app.js" "release\backend\app.js"
        copy "$(backendDir)\server.js" "release\backend\server.js"
        copy "$(backendDir)\package.json" "release\backend\package.json"
        copy "$(backendDir)\package-lock.json" "release\backend\package-lock.json"

        if exist "$(backendDir)\.env.example" copy "$(backendDir)\.env.example" "release\backend\.env.example"

        echo ===== COPY FRONTEND BUILD =====
        if exist "$(Pipeline.Workspace)\$(frontendDistArtifact)" (
          xcopy "$(Pipeline.Workspace)\$(frontendDistArtifact)" "release\frontend\dist\" /E /I /Y
        ) else (
          echo ERROR: Downloaded frontend dist artifact not found
          exit /b 1
        )

        copy "$(frontendDir)\package.json" "release\frontend\package.json"
        copy "$(frontendDir)\package-lock.json" "release\frontend\package-lock.json"

        if exist "$(frontendDir)\.env.example" copy "$(frontendDir)\.env.example" "release\frontend\.env.example"

        echo ===== VERIFY RELEASE CONTENT =====
        dir release
        dir release\frontend
        dir release\frontend\dist
      displayName: 'Package application artifact'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish pipeline artifact'
      inputs:
        targetPath: 'release'
        artifact: '$(artifactName)'

# =========================
# DEPLOY DEV
# =========================
- stage: Deploy_Dev
  displayName: 'Deploy to Dev Env'
  dependsOn: Deliver
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy to Dev'
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download artifact'
            inputs:
              artifact: '$(artifactName)'
              path: '$(Pipeline.Workspace)\$(artifactName)'

          - script: |
              echo ===== MOCK DEPLOY TO DEV =====

              if exist "$(deployRoot)\dev" rmdir /s /q "$(deployRoot)\dev"
              mkdir "$(deployRoot)\dev"

              xcopy "$(Pipeline.Workspace)\$(artifactName)\*" "$(deployRoot)\dev\" /E /I /Y

              echo ===== VERIFY DEV DEPLOYMENT =====
              dir "$(deployRoot)\dev"
              dir "$(deployRoot)\dev\frontend"
              dir "$(deployRoot)\dev\frontend\dist"

              echo ===== CREATE MOCK DEV ENV FILE =====
              if exist "$(deployRoot)\dev\backend" (
                cd "$(deployRoot)\dev\backend"
                (
                  echo NODE_ENV=development
                  echo PORT=4000
                  echo JWT_SECRET=mocksecret
                  echo JWT_EXPIRES_IN=1d
                  echo ADMIN_SECRET_KEY=mockadmin
                  echo MONGO_URI=mongodb://127.0.0.1:27017/comp308-assignment2-gaming-db
                  echo CLIENT_URL=http://localhost:3000
                  echo COOKIE_NAME=token
                ) > .env
              )

              echo ===== LAUNCH DEPLOYED APP (MOCK) =====
              if exist "$(deployRoot)\dev\backend\server.js" (
                cd "$(deployRoot)\dev\backend"
                start "Mock Backend Dev" cmd /k node server.js
              )

              if exist "$(deployRoot)\dev\frontend\dist\index.html" (
                start "" "$(deployRoot)\dev\frontend\dist\index.html"
              )

              echo Frontend launched from: $(deployRoot)\dev\frontend\dist\index.html
              echo Backend launched from: $(deployRoot)\dev\backend\server.js
            displayName: 'Deploy and launch Dev app'

# =========================
# DEPLOY QAT
# =========================
- stage: Deploy_QAT
  displayName: 'Deploy to QAT Env'
  dependsOn: Deploy_Dev
  condition: succeeded()
  jobs:
  - deployment: DeployQAT
    displayName: 'Deploy to QAT'
    environment: 'qat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download artifact'
            inputs:
              artifact: '$(artifactName)'
              path: '$(Pipeline.Workspace)\$(artifactName)'

          - script: |
              echo ===== MOCK DEPLOY TO QAT =====

              if exist "$(deployRoot)\qat" rmdir /s /q "$(deployRoot)\qat"
              mkdir "$(deployRoot)\qat"

              xcopy "$(Pipeline.Workspace)\$(artifactName)\*" "$(deployRoot)\qat\" /E /I /Y

              echo QAT deployment completed.
              echo Artifact copied to: $(deployRoot)\qat
            displayName: 'Deploy artifact to QAT'

# =========================
# DEPLOY STAGING
# =========================
- stage: Deploy_Staging
  displayName: 'Deploy to Staging Env'
  dependsOn: Deploy_QAT
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy to Staging'
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download artifact'
            inputs:
              artifact: '$(artifactName)'
              path: '$(Pipeline.Workspace)\$(artifactName)'

          - script: |
              echo ===== MOCK DEPLOY TO STAGING =====

              if exist "$(deployRoot)\staging" rmdir /s /q "$(deployRoot)\staging"
              mkdir "$(deployRoot)\staging"

              xcopy "$(Pipeline.Workspace)\$(artifactName)\*" "$(deployRoot)\staging\" /E /I /Y

              echo Staging deployment completed.
              echo Artifact copied to: $(deployRoot)\staging
            displayName: 'Deploy artifact to Staging'

# =========================
# DEPLOY PRODUCTION
# =========================
- stage: Deploy_Production
  displayName: 'Deploy to Production Env'
  dependsOn: Deploy_Staging
  condition: succeeded()
  jobs:
  - deployment: DeployProduction
    displayName: 'Deploy to Production'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download artifact'
            inputs:
              artifact: '$(artifactName)'
              path: '$(Pipeline.Workspace)\$(artifactName)'

          - script: |
              echo ===== MOCK DEPLOY TO PRODUCTION =====

              if exist "$(deployRoot)\production" rmdir /s /q "$(deployRoot)\production"
              mkdir "$(deployRoot)\production"

              xcopy "$(Pipeline.Workspace)\$(artifactName)\*" "$(deployRoot)\production\" /E /I /Y

              echo Production deployment completed.
              echo Artifact copied to: $(deployRoot)\production
            displayName: 'Deploy artifact to Production'
